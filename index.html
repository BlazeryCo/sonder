<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonder Web</title>
    <!-- Подключаем шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background-color: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Экраны */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background-color: #000;
        }

        .screen.active {
            display: flex;
        }

        /* Общие стили для шапки */
        .header {
            padding: 16px 20px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: none;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: white;
            letter-spacing: -0.5px;
        }

        .header button {
            background: none;
            border: none;
            color: #0a84ff;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
        }

        /* Контентная область с отступами */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 20px 16px;
            background-color: #000;
            scrollbar-width: thin;
            scrollbar-color: #3a3a3c #000;
        }

        /* Стили для авторизации */
        .auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            padding: 0 24px;
        }

        .auth-container .form-group {
            margin-bottom: 20px;
        }

        .auth-container label {
            display: block;
            margin-bottom: 8px;
            color: #8e8e93;
            font-size: 15px;
            font-weight: 500;
        }

        .auth-container input {
            width: 100%;
            padding: 16px;
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 18px;
            color: #fff;
            font-size: 17px;
        }

        .auth-container .btn {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .auth-container .btn.secondary {
            background-color: #2c2c2e;
        }

        /* Главный экран (после входа) */
        #main-screen {
            position: relative;
            height: 100%;
        }

        /* Десктопная раскладка */
        .desktop-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Панель списка чатов (мобильная и десктопная) */
        .chats-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background-color: #000;
        }

        /* Заголовок чатов с кнопкой + */
        .chats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
        }

        .chats-header h2 {
            font-size: 34px;
            font-weight: 600;
            color: white;
            padding-top: 70px;
        }

        .chats-header button {
            background: none;
            border: none;
            color: #0a84ff;
            font-size: 28px;
            cursor: pointer;
            padding-top: 70px;
        }

        /* Список чатов */
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 90px; /* Отступ под нижнюю панель */
            padding-top: 20px;
        }

        .chat-item {
            background-color: #0d0d0e;
            border-radius: 30px;
            padding: 11px 11px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: 0px solid #2c2c2e;
        }

        .chat-item:active {
            background-color: #2c2c2e;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            background-color: #020202;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 22px;
            color: white;
            text-transform: uppercase;
            cursor: pointer;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 20px;
            margin-bottom: 2;
            color: #fff;
        }

        .chat-last-message {
            color: #8e8e93;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
            font-weight: 500;

        }

        /* Панель чата (окно переписки) */
        .chat-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background-color: #000;
            position: relative;
        }

        .chat-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2c2c2e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chat-header .back-btn {
            font-size: 24px;
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            padding: 0 8px;
        }

        .chat-header .contact-name {
            font-size: 20px;
            font-weight: 600;
            color: white;
            flex: 1;
        }

        .typing-indicator {
            color: #0f0f0f;
            font-size: 14px;
            margin-left: 12px;
            margin-bottom: 4px;
            font-style: italic;
            padding-left: 16px;
        }

        /* Контейнер сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 24px;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.4;
        }

        .message.own {
            align-self: flex-end;
            background-color: #0a84ff;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.other {
            align-self: flex-start;
            background-color: #2c2c2e;
            color: white;
            border-bottom-left-radius: 6px;
        }

        /* Поле ввода сообщения */
        .message-input-area {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0px 0px;
            /* border-top: 0px solid #2c2c2e; */
            /* backdrop-filter: blur(10px); */
            /* background-color: rgba(28,28,30,0.8); */
            border-radius: 50px;
            margin: 0px 16px 20px 16px;
            background: transparent;
        }

        .message-input-area input {
            flex: 1;
            padding: 16px 20px;
            background-color: #0f0f0f;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            
        }

        .message-input-area input::placeholder {
            color: #8e8e93;
            font-weight: 400;
        }

        .message-input-area button {
            width: 54px;
            height: 54px;
            border-radius: 27px;
            background-color: #0a84ff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 26px;
            transition: opacity 0.2s;
        }

        .message-input-area button:active {
            opacity: 0.7;
        }

        /* Нижняя панель навигации (Liquid Glass) */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            width: fit-content;
            min-width: 200px;
            max-width: 300px;
            margin: 0 auto;
            background-color: rgba(50, 50, 52, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 5px 5px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 16px;
            border-radius: 30px;
            transition: background-color 0.2s;
            cursor: pointer;
            flex: 1;
        }

        .nav-item.active {
            background-color: rgba(63, 63, 63, 0.2);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        .nav-icon2 {
            width: 27px;
            height: 27px;
            object-fit: contain;
        }

         .nav-icon3 {
            width: 19px;
            height: 19px;
            object-fit: contain;
        }

        .back-btn2 {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .nav-label {
            font-size: 12px;
            font-weight: 500;
        }

        .nav-item.active .nav-icon,
        .nav-item.active .nav-label {
            color: #ffffff;
        }

        .nav-item:not(.active) .nav-icon,
        .nav-item:not(.active) .nav-label {
            color: #8e8e93;
        }

        /* Верхняя индикация выбранного раздела */
        .section-indicator {
            background-color: rgba(28,28,30,0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 12px 24px;
            margin: 16px auto 12px auto;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            width: fit-content;
            min-width: 200px;
            max-width: 300px;
            display: block;
        }

        /* Скрытие элементов */
        .hidden {
            display: none !important;
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: #1c1c1e;
            padding: 24px;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #2c2c2e;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 22px;
            color: white;
        }

        .modal-content .form-group {
            margin-bottom: 20px;
        }

        .modal-content label {
            display: block;
            margin-bottom: 8px;
            color: #8e8e93;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 14px;
            background-color: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 18px;
            color: white;
            font-size: 16px;
        }

        .modal-content .btn {
            background-color: #0a84ff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 20px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .send-message-icon{
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .modal-content .btn.secondary {
            background-color: #2c2c2e;
        }

        /* Адаптация под десктоп */
        @media (min-width: 1024px) {
            #app {
                max-width: 1200px;
                height: 90vh;
                border-radius: 30px;
                overflow: hidden;
                flex-direction: row;
            }

            .desktop-layout {
                display: flex;
                width: 100%;
                height: 100%;
            }

            .chats-panel {
                width: 350px;
                border-right: 1px solid #2c2c2e;
                background-color: #000;
                display: flex;
                flex-direction: column;
                height: 100%;
            }

            .chat-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                background-color: #000;
            }

            .bottom-nav {
                display: none;
            }

            .section-indicator {
                display: none;
            }

            .chats-list {
                padding-bottom: 20px;
            }

            .message-input-area {
                margin: 12px 20px 20px 20px;
            }
        }

        /* Для iPhone увеличение отступов */
        @media (max-width: 390px) {
            .chats-list {
                padding-left: 8px;
                padding-right: 8px;
            }
        }
        
    </style>
</head>
<body>
    <div id="app">
        <!-- Экран входа -->
        <div id="login-screen" class="screen active">
            <div class="header">
                <h1>Sonder</h1>
            </div>
            <div class="content auth-container">
                <div class="form-group">
                    <label>Ник</label>
                    <input type="text" id="login-username" placeholder="Ваш ник">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="Пароль">
                </div>
                <button class="btn" id="login-btn">Войти</button>
                <button class="btn secondary" id="go-to-register">Нет аккаунта? Зарегистрироваться</button>
            </div>
        </div>

        <!-- Экран регистрации -->
        <div id="register-screen" class="screen">
            <div class="header">
                <h1>Sonder</h1>
            </div>
            <div class="content auth-container">
                <div class="form-group">
                    <label>Ник</label>
                    <input type="text" id="register-username" placeholder="Придумайте ник">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="register-password" placeholder="Придумайте пароль">
                </div>
                <button class="btn" id="register-btn">Зарегистрироваться</button>
                <button class="btn secondary" id="go-to-login">Уже есть аккаунт? Войти</button>
            </div>
        </div>

        <!-- Основное приложение (после входа) -->
        <div id="main-screen" class="screen">
            <div class="desktop-layout">
                <!-- Панель чатов -->
                <div id="chats-panel" class="chats-panel">
                    <!-- Заголовок с кнопкой + (видна на всех устройствах) -->
                    <div class="chats-header">
                        <h2>Sonder</h2>
                        <button id="new-chat-desktop-btn"><img src="addicon.png" class="nav-icon3" alt="Добавить"></button>
                    </div>

                    <!-- Индикатор раздела (для мобильных) -->
                    <div class="section-indicator" id="section-indicator" style="display: none;">Чаты</div>

                    <!-- Список чатов -->
                    <div class="content" id="chats-list-container" style="padding-bottom: 100px;">
                        <div id="chats-list" class="chats-list"></div>
                    </div>

                    <!-- Нижняя панель навигации (только для мобильных) -->
                    <div class="bottom-nav" id="bottom-nav">
                        <div class="nav-item active" id="nav-chats" data-section="chats">
                            <span class="nav-icon"><img src="chat-balloon.png" class="nav-icon" alt="Чаты"></span>
                            <span class="nav-label">Чаты</span>
                        </div>
                        <div class="nav-item" id="nav-settings" data-section="settings">
                            <span class="nav-icon"><img src="iconsettings.png" class="nav-icon2" alt="Настройки"></span>
                            <span class="nav-label">Настройки</span>
                        </div>
                    </div>
                </div>

                <!-- Панель текущего чата -->
                <div id="chat-panel" class="chat-panel hidden">
                    <div class="chat-header">
                        <button class="back-btn" id="back-to-chats"><img src="bckicon.png" class="back-btn2" alt="back"></button>
                        <span class="contact-name" id="current-chat-name">...</span>
                    </div>
                    <div id="typing-status" class="typing-indicator hidden"></div>
                    <div id="messages-container" class="messages-container"></div>
                    <div class="message-input-area">
                        <input type="text" id="message-input" placeholder="Сообщение" maxlength="130">
                        <button id="send-message"><img src="righticonsnd.png" class="send-message-icon" alt="send"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно нового чата -->
        <div id="new-chat-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Новый чат</h3>
                <div class="form-group">
                    <label>Ник собеседника</label>
                    <input type="text" id="new-chat-username" placeholder="Введите ник">
                </div>
                <button class="btn" id="create-chat-btn">Создать чат</button>
                <button class="btn secondary" id="cancel-chat-btn">Отмена</button>
            </div>
        </div>

        <!-- Модальное окно настроек профиля (раздел Настройки) -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Настройки профиля</h3>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="profile-description" placeholder="О себе"></textarea>
                </div>
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="text" id="profile-number" placeholder="+7...">
                </div>
                <button class="btn" id="save-profile-btn">Готово</button>
                <button class="btn secondary" id="close-settings-btn">Закрыть</button>
                <button class="btn secondary" id="logout-btn" style="margin-top: 16px;">Выйти</button>
            </div>
        </div>

        <!-- Модальное окно профиля контакта -->
        <div id="contact-profile-modal" class="modal hidden">
            <div class="modal-content">
                <h3 id="contact-profile-name">Профиль</h3>
                <div style="display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 20px;">
                    <div id="contact-profile-avatar" style="width: 80px; height: 80px; background-color: #001325; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 600; color: white; text-transform: uppercase;">?</div>
                    <div style="width: 100%; background-color: #1c1c1e; border-radius: 16px; padding: 16px;">
                        <div style="color: #8e8e93; font-size: 14px; margin-bottom: 4px;">Описание</div>
                        <div id="contact-profile-desc" style="font-size: 17px; color: white; word-break: break-word;">нет описания</div>
                    </div>
                    <div style="width: 100%; background-color: #1c1c1e; border-radius: 16px; padding: 16px;">
                        <div style="color: #8e8e93; font-size: 14px; margin-bottom: 4px;">Номер телефона</div>
                        <div id="contact-profile-phone" style="font-size: 17px; color: white;">не указан</div>
                    </div>
                </div>
                <button class="btn secondary" id="close-contact-profile-btn">Закрыть</button>
            </div>
        </div>
    </div>

 <script>
        // ==================== КОНФИГУРАЦИЯ FIREBASE ====================
        const FIREBASE_URL = 'https://sonderbase111-default-rtdb.firebaseio.com/';

        async function firebaseGet(path) {
            const url = `${FIREBASE_URL}${path}.json`;
            const res = await fetch(url);
            return res.json();
        }

        async function firebasePut(path, data) {
            const url = `${FIREBASE_URL}${path}.json`;
            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        async function firebasePatch(path, data) {
            const url = `${FIREBASE_URL}${path}.json`;
            const res = await fetch(url, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return res.json();
        }

        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentUser = null;
        let currentChatContact = null;
        let messagesCount = 0;
        let lastMessages = [];
        let typingTimeout = null;
        let pollingInterval = null;

        // DOM элементы
        const loginScreen = document.getElementById('login-screen');
        const registerScreen = document.getElementById('register-screen');
        const mainScreen = document.getElementById('main-screen');
        const chatsPanel = document.getElementById('chats-panel');
        const chatPanel = document.getElementById('chat-panel');
        const chatsListDiv = document.getElementById('chats-list');
        const messagesContainer = document.getElementById('messages-container');
        const typingStatus = document.getElementById('typing-status');
        const currentChatName = document.getElementById('current-chat-name');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-message');
        const backToChats = document.getElementById('back-to-chats');
        const newChatModal = document.getElementById('new-chat-modal');
        const settingsModal = document.getElementById('settings-modal');
        const profileDescription = document.getElementById('profile-description');
        const profileNumber = document.getElementById('profile-number');
        const saveProfileBtn = document.getElementById('save-profile-btn');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const createChatBtn = document.getElementById('create-chat-btn');
        const cancelChatBtn = document.getElementById('cancel-chat-btn');
        const newChatUsername = document.getElementById('new-chat-username');
        const navChats = document.getElementById('nav-chats');
        const navSettings = document.getElementById('nav-settings');
        const sectionIndicator = document.getElementById('section-indicator');
        const newChatDesktopBtn = document.getElementById('new-chat-desktop-btn');
        const contactProfileModal = document.getElementById('contact-profile-modal');
        const contactProfileName = document.getElementById('contact-profile-name');
        const contactProfileAvatar = document.getElementById('contact-profile-avatar');
        const contactProfileDesc = document.getElementById('contact-profile-desc');
        const contactProfilePhone = document.getElementById('contact-profile-phone');
        const closeContactProfileBtn = document.getElementById('close-contact-profile-btn');

        // Элементы авторизации
        const loginUsername = document.getElementById('login-username');
        const loginPassword = document.getElementById('login-password');
        const loginBtn = document.getElementById('login-btn');
        const goToRegister = document.getElementById('go-to-register');
        const registerUsername = document.getElementById('register-username');
        const registerPassword = document.getElementById('register-password');
        const registerBtn = document.getElementById('register-btn');
        const goToLogin = document.getElementById('go-to-login');

        // ==================== СОХРАНЕНИЕ ВХОДА ====================
        // Проверяем сохраненного пользователя
        const savedUser = localStorage.getItem('sonder_current_user');
        if (savedUser) {
            currentUser = savedUser;
            window.restoreSession = true;
        }

        // ==================== УТИЛИТЫ ====================
        function showScreen(screen) {
            loginScreen.classList.remove('active');
            registerScreen.classList.remove('active');
            mainScreen.classList.remove('active');
            screen.classList.add('active');
        }

        // Управление навигацией (мобильная)
        function setActiveSection(section) {
            if (section === 'chats') {
                navChats.classList.add('active');
                navSettings.classList.remove('active');
                sectionIndicator.innerText = 'Чаты';
                if (window.innerWidth < 1024) {
                    chatPanel.classList.add('hidden');
                    chatsPanel.style.display = 'flex';
                }
            } else {
                navSettings.classList.add('active');
                navChats.classList.remove('active');
                sectionIndicator.innerText = 'Настройки';
                loadProfile();
                settingsModal.classList.remove('hidden');
            }
        }

        // Показать/скрыть панель чата на мобильных
        function showChatPanel(show) {
            if (window.innerWidth < 1024) {
                if (show) {
                    chatsPanel.style.display = 'none';
                    chatPanel.classList.remove('hidden');
                } else {
                    chatsPanel.style.display = 'flex';
                    chatPanel.classList.add('hidden');
                }
            }
        }

        // Инициализация после входа
        async function initMainApp() {
            showScreen(mainScreen);
            setActiveSection('chats');
            await loadChatsList();
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(pollUpdates, 3000);
        }

        // Загрузка списка чатов
        async function loadChatsList() {
            if (!currentUser) return;
            const userData = await firebaseGet(`Accounts/${currentUser}/ChatWith`);
            if (!userData) {
                chatsListDiv.innerHTML = '<div style="color: #8e8e93; text-align: center; margin-top: 40px;">Нет чатов. Нажмите +, чтобы добавить.</div>';
                return;
            }

            let html = '';
            const contacts = Object.keys(userData).sort((a, b) => 0);

            for (const contact of contacts) {
                const chatInfo = userData[contact];
                const lastMsg = chatInfo.LastMessage || 'Нет сообщений';
                html += `
                    <div class="chat-item" data-contact="${contact}">
                        <div class="chat-avatar" data-contact="${contact}">${contact[0]}</div>
                        <div class="chat-info">
                            <div class="chat-name">${contact}</div>
                            <div class="chat-last-message">${lastMsg}</div>
                        </div>
                    </div>
                `;
            }
            chatsListDiv.innerHTML = html || '<div style="color: #8e8e93; text-align: center; margin-top: 40px;">Нет чатов. Нажмите +, чтобы добавить.</div>';

            document.querySelectorAll('.chat-item').forEach(item => {
                const contact = item.dataset.contact;
                const avatar = item.querySelector('.chat-avatar');
                avatar.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openContactProfile(contact);
                });
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('chat-avatar')) {
                        openChat(contact);
                    }
                });
            });
        }

        // Открыть профиль контакта
        async function openContactProfile(contact) {
            const userData = await firebaseGet(`Accounts/${contact}`);
            contactProfileName.innerText = contact;
            contactProfileAvatar.innerText = contact[0].toUpperCase();
            contactProfileDesc.innerText = userData.Description || 'нет описания';
            contactProfilePhone.innerText = userData.Number || 'не указан';
            contactProfileModal.classList.remove('hidden');
        }

        // Открыть чат
        async function openChat(contact) {
            currentChatContact = contact;
            currentChatName.innerText = contact;
            await loadMessages(contact);
            showChatPanel(true);
            // На десктопе тоже показываем панель чата
            if (window.innerWidth >= 1024) {
                chatPanel.classList.remove('hidden');
            }
            await updateTypingStatus(contact);
        }

        // Загрузить сообщения
        async function loadMessages(contact) {
            if (!currentUser || !contact) return;
            const chatPath = `Accounts/${currentUser}/ChatWith/${contact}`;
            const chatData = await firebaseGet(chatPath);
            if (!chatData) return;

            messagesCount = chatData.MessagesCount || 0;
            const messages = [];
            for (let i = 1; i <= messagesCount; i++) {
                if (chatData[i]) messages.push(chatData[i]);
            }
            lastMessages = messages;
            renderMessages(messages);
        }

        function renderMessages(messages) {
            messagesContainer.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.from === currentUser ? 'own' : 'other'}`;
                div.textContent = msg.text;
                messagesContainer.appendChild(div);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Индикатор печати
        async function updateTypingStatus(contact) {
            if (!currentUser || !contact) return;
            const typingPath = `Accounts/${contact}/TextingFrom/${currentUser}`;
            const status = await firebaseGet(typingPath);
            if (status === 'T') {
                typingStatus.classList.remove('hidden');
                typingStatus.innerText = `${contact} печатает...`;
            } else {
                typingStatus.classList.add('hidden');
            }
        }

        // Отправка сообщения
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChatContact || !currentUser) return;
            if (text.length > 130) {
                alert('Сообщение не должно превышать 130 символов');
                return;
            }

            const myChatPath = `Accounts/${currentUser}/ChatWith/${currentChatContact}`;
            const theirChatPath = `Accounts/${currentChatContact}/ChatWith/${currentUser}`;

            const myChat = await firebaseGet(myChatPath) || { MessagesCount: 0, LastMessage: '' };
            const theirChat = await firebaseGet(theirChatPath) || { MessagesCount: 0, LastMessage: '' };

            const newMsgId = (myChat.MessagesCount || 0) + 1;
            const messageData = { from: currentUser, text };

            myChat.MessagesCount = newMsgId;
            myChat.LastMessage = text;
            myChat[newMsgId] = messageData;

            theirChat.MessagesCount = (theirChat.MessagesCount || 0) + 1;
            theirChat.LastMessage = text;
            theirChat[newMsgId] = messageData;

            await firebasePut(myChatPath, myChat);
            await firebasePut(theirChatPath, theirChat);

            await setTypingStatus(currentChatContact, 'F');

            messageInput.value = '';
            await loadMessages(currentChatContact);
            await loadChatsList();
        }

        // Установка статуса печати
        async function setTypingStatus(contact, status) {
            if (!currentUser || !contact) return;
            const path = `Accounts/${currentUser}/TextingFrom/${contact}`;
            await firebasePut(path, status);
        }

        // Обработка ввода (индикатор печати)
        function handleTyping() {
            if (!currentChatContact) return;
            setTypingStatus(currentChatContact, 'T');
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                setTypingStatus(currentChatContact, 'F');
            }, 2000);
        }

        // Опрос обновлений
        async function pollUpdates() {
            if (!currentUser) return;
            if (currentChatContact) {
                const chatPath = `Accounts/${currentUser}/ChatWith/${currentChatContact}`;
                const chatData = await firebaseGet(chatPath);
                if (chatData && chatData.MessagesCount !== messagesCount) {
                    await loadMessages(currentChatContact);
                }
                await updateTypingStatus(currentChatContact);
            }
            await loadChatsList();
        }

        // Добавление нового чата
        async function createNewChat() {
            const contact = newChatUsername.value.trim();
            if (!contact) return alert('Введите ник');
            if (contact === currentUser) return alert('Нельзя начать чат с самим собой');

            const userExists = await firebaseGet(`Accounts/${contact}`);
            if (!userExists) return alert('Пользователь не найден');

            const myChatPath = `Accounts/${currentUser}/ChatWith/${contact}`;
            const myChat = await firebaseGet(myChatPath);
            if (myChat) return alert('Чат уже существует');

            await firebasePut(myChatPath, { MessagesCount: 0, LastMessage: '' });

            const theirChatPath = `Accounts/${contact}/ChatWith/${currentUser}`;
            await firebasePut(theirChatPath, { MessagesCount: 0, LastMessage: '' });

            await firebasePut(`Accounts/${currentUser}/TextingFrom/${contact}`, 'F');
            await firebasePut(`Accounts/${contact}/TextingFrom/${currentUser}`, 'F');

            newChatModal.classList.add('hidden');
            newChatUsername.value = '';
            await loadChatsList();
        }

        // Загрузка профиля
        async function loadProfile() {
            if (!currentUser) return;
            const userData = await firebaseGet(`Accounts/${currentUser}`);
            profileDescription.value = userData.Description || 'нет описания';
            profileNumber.value = userData.Number || 'не указан';
        }

        // Сохранение профиля
        async function saveProfile() {
            const desc = profileDescription.value.trim() || 'нет описания';
            const num = profileNumber.value.trim() || 'не указан';
            await firebasePatch(`Accounts/${currentUser}`, {
                Description: desc,
                Number: num
            });
            alert('Профиль обновлён');
            settingsModal.classList.add('hidden');
        }

        // Выход
        function logout() {
            localStorage.removeItem('sonder_current_user'); // Добавлено
            currentUser = null;
            currentChatContact = null;
            if (pollingInterval) clearInterval(pollingInterval);
            showScreen(loginScreen);
        }

        // ==================== ОБРАБОТЧИКИ ====================
        loginBtn.addEventListener('click', async () => {
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();
            if (!username || !password) return alert('Заполните все поля');

            const userData = await firebaseGet(`Accounts/${username}`);
            if (!userData || userData.Password !== password) {
                return alert('Неверный ник или пароль');
            }
            currentUser = username;
            localStorage.setItem('sonder_current_user', username); // Добавлено
            await initMainApp();
        });

        goToRegister.addEventListener('click', () => showScreen(registerScreen));

        registerBtn.addEventListener('click', async () => {
            const username = registerUsername.value.trim();
            const password = registerPassword.value.trim();
            if (!username || !password) return alert('Заполните все поля');

            const existing = await firebaseGet(`Accounts/${username}`);
            if (existing) return alert('Пользователь уже существует');

            const newUser = {
                Description: 'нет описания',
                Number: 'не указан',
                Password: password,
                TextingFrom: {},
                ChatWith: {}
            };
            await firebasePut(`Accounts/${username}`, newUser);
            alert('Регистрация успешна! Теперь войдите.');
            showScreen(loginScreen);
        });

        goToLogin.addEventListener('click', () => showScreen(loginScreen));

        backToChats.addEventListener('click', () => {
            showChatPanel(false);
            currentChatContact = null;
        });

        // Навигация по вкладкам
        navChats.addEventListener('click', () => {
            setActiveSection('chats');
        });

        navSettings.addEventListener('click', () => {
            setActiveSection('settings');
        });

        // Кнопка добавления чата (десктоп и мобильная)
        newChatDesktopBtn.addEventListener('click', () => {
            newChatModal.classList.remove('hidden');
        });

        // Для мобильных также можно добавить обработчик на заголовок (но теперь есть кнопка)
        setTimeout(() => {
            const header = document.querySelector('.section-indicator');
            if (header) {
                header.style.cursor = 'pointer';
                header.addEventListener('click', () => {
                    newChatModal.classList.remove('hidden');
                });
            }
        }, 1000);

        cancelChatBtn.addEventListener('click', () => {
            newChatModal.classList.add('hidden');
        });

        createChatBtn.addEventListener('click', createNewChat);

        // Профиль (свои настройки)
        saveProfileBtn.addEventListener('click', saveProfile);
        closeSettingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('hidden');
            setActiveSection('chats');
        });

        logoutBtn.addEventListener('click', logout);

        // Профиль контакта
        closeContactProfileBtn.addEventListener('click', () => {
            contactProfileModal.classList.add('hidden');
        });

        // Чат
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('input', handleTyping);

        // Закрытие модалок по клику вне
        window.addEventListener('click', (e) => {
            if (e.target === newChatModal) newChatModal.classList.add('hidden');
            if (e.target === settingsModal) settingsModal.classList.add('hidden');
            if (e.target === contactProfileModal) contactProfileModal.classList.add('hidden');
        });

        // Адаптация при изменении размера окна
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                chatsPanel.style.display = 'flex';
                // Не скрываем чат автоматически, если он открыт
                if (currentChatContact) {
                    chatPanel.classList.remove('hidden');
                } else {
                    chatPanel.classList.add('hidden');
                }
            } else {
                if (currentChatContact) {
                    showChatPanel(true);
                } else {
                    showChatPanel(false);
                }
            }
        });

        // Восстановление сессии или показ экрана входа
        if (window.restoreSession && currentUser) {
            initMainApp();
        } else {
            showScreen(loginScreen);
        }
    </script>
</body>
</html>
